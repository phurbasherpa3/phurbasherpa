<!DOCTYPE html>

    <title>Page Not Found | Phurba Geljen Sherpa</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        // GitHub Pages redirect script for single-page apps
        // This helps handle routing issues on project sites
        if (window.location.pathname !== '/') {
            const segments = window.location.pathname.split('/').filter(p => p);
            if (segments.length > 0 && !segments[segments.length - 1].includes('.')) {
                // Redirect directory-like paths to index with hash
                let redirectPath = '/#/' + segments.join('/');
                window.location.replace(redirectPath);
            }
        }
    </script>
</head>
